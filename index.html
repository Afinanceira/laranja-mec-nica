<!DOCTYPE html>

    <title>Laranja Mecânica | Cardápio</title>
    <style>

        body { background: var(--fundo); color: white; font-family: 'Arial', sans-serif; margin: 0; padding: 20px; }

        .item-info p { margin: 5px 0 0; font-size: 0.85rem; color: #bbb; }
        
        .preco { font-weight: bold; font-size: 1.1rem; min-width: 80px; text-align: right; }
        
        .btn-whatsapp { background: #25d366; color: white; position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; padding: 15px; border: none; border-radius: 30px; font-weight: bold; text-align: center; text-decoration: none; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
    </style>
