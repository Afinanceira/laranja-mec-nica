<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Laranja Mecânica | Cardápio Bio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --orange: #ff6600;
            --dark: #0a0a0a;
            --grey: #1c1c1c;
            --text: #ffffff;
            --accent: #25d366;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        body { background-color: var(--dark); color: var(--text); line-height: 1.6; overflow-x: hidden; }

        /* HEADER ESTILIZADO */
        header { 
            text-align: center; 
            padding: 40px 20px; 
            background: linear-gradient(180deg, rgba(255,102,0,0.1) 0%, rgba(10,10,10,1) 100%);
            border-bottom: 2px solid var(--orange);
        }
        .logo { width: 85px; height: 85px; border-radius: 50%; border: 2px solid var(--orange); padding: 3px; margin-bottom: 15px; }
        h1 { font-size: 1.4rem; text-transform: uppercase; letter-spacing: 2px; color: var(--orange); }
        .sub { font-size: 0.8rem; letter-spacing: 1px; opacity: 0.8; }

        /* NAVEGAÇÃO POR CATEGORIAS */
        .nav-container { position: sticky; top: 0; background: var(--dark); padding: 15px 10px; z-index: 100; border-bottom: 1px solid #333; }
        .nav-tabs { display: flex; gap: 10px; overflow-x: auto; scrollbar-width: none; }
        .nav-tabs::-webkit-scrollbar { display: none; }
        .tab { 
            background: var(--grey); border: 1px solid #333; color: white; 
            padding: 8px 18px; border-radius: 20px; font-size: 0.85rem; 
            white-space: nowrap; cursor: pointer; transition: 0.3s;
        }
        .tab.active { background: var(--orange); border-color: var(--orange); font-weight: bold; }

        /* LISTA DE PRODUTOS */
        .container { padding: 20px; max-width: 600px; margin: auto; }
        .product-card { 
            background: var(--grey); border-radius: 12px; padding: 16px; 
            margin-bottom: 15px; display: flex; justify-content: space-between; 
            align-items: center; border: 1px solid #222;
        }
        .info { flex: 1; padding-right: 10px; }
        .info h3 { font-size: 1rem; color: var(--orange); margin-bottom: 5px; }
        .info p { font-size: 0.75rem; color: #aaa; margin-bottom: 8px; line-height: 1.2; }
        .price { font-weight: bold; color: white; font-size: 1rem; }

        /* BOTÕES DE QUANTIDADE */
        .qty-box { display: flex; align-items: center; gap: 10px; background: #000; border-radius: 8px; padding: 4px; }
        .btn-qty { 
            background: var(--orange); border: none; color: white; 
            width: 30px; height: 30px; border-radius: 6px; font-weight: bold; font-size: 1.2rem;
        }

        /* FORMULÁRIO DE FINALIZAÇÃO */
        .checkout-form { 
            background: #111; border-radius: 15px; padding: 20px; 
            margin-top: 30px; border: 1px dashed var(--orange); display: none;
        }
        .checkout-form.visible { display: block; }
        .checkout-form h2 { font-size: 1.1rem; color: var(--orange); margin-bottom: 15px; text-transform: uppercase; }
        
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 0.75rem; color: #888; margin-bottom: 5px; text-transform: uppercase; }
        .input-group input { 
            width: 100%; background: #222; border: 1px solid #444; color: white; 
            padding: 12px; border-radius: 8px; font-size: 1rem; outline: none;
        }
        .input-group input:focus { border-color: var(--orange); }

        /* BOTÃO FIXO WHATSAPP */
        .footer-action { 
            position: fixed; bottom: 0; left: 0; right: 0; 
            padding: 15px; background: rgba(10,10,10,0.9); 
            backdrop-filter: blur(10px); display: none;
        }
        .btn-whatsapp { 
            background: var(--accent); color: white; width: 100%; 
            padding: 16px; border: none; border-radius: 12px; 
            font-weight: bold; font-size: 1rem; cursor: pointer;
            display: flex; justify-content: space-between; align-items: center;
        }
    </style>
</head>
<body>

<header>
    <img src="https://via.placeholder.com/150" class="logo" alt="Laranja Mecânica Logo">
    <h1>Laranja Mecânica</h1>
    <p class="sub">DRINKS • BURGERS • CULTURE</p>
</header>

<div class="nav-container">
    <div class="nav-tabs">
        <div class="tab active" onclick="filterCategory('drinks')">Cocktails</div>
        <div class="tab" onclick="filterCategory('burgers')">Burgers</div>
        <div class="tab" onclick="filterCategory('porcoes')">Para Compartilhar</div>
        <div class="tab" onclick="filterCategory('cervejas')">Cervejas</div>
    </div>
</div>

<div class="container" id="menu-items">
    </div>

<div class="container">
    <div class="checkout-form" id="checkout-form">
        <h2><i class="fas fa-truck"></i> Dados de Entrega</h2>
        <div class="input-group">
            <label>Qual seu nome?</label>
            <input type="text" id="user_name" placeholder="Ex: Paloma Araújo">
        </div>
        <div class="input-group">
            <label>Endereço Completo</label>
            <input type="text" id="user_address" placeholder="Rua, nº, Bairro (Campina Grande)">
        </div>
    </div>
</div>

<div class="footer-action" id="footer-action">
    <button class="btn-whatsapp" onclick="sendToWhatsApp()">
        <span><i class="fab fa-whatsapp"></i> CONCLUIR PEDIDO</span>
        <span id="total-price">R$ 0,00</span>
    </button>
</div>

<script>
    const menu = [
        { id: 1, cat: 'drinks', name: 'Alex DeLarge', price: 34.00, desc: 'Gin, licor de laranja, tônica e rodelas de laranja cítrica.' },
        { id: 2, cat: 'drinks', name: 'Negroni Industrial', price: 32.00, desc: 'Clássico com Gin, Campari e Vermute em infusão especial.' },
        { id: 3, cat: 'burgers', name: 'Moloko Burger', price: 38.00, desc: 'Blend 180g, cheddar derretido e bacon crocante.' },
        { id: 4, cat: 'porcoes', name: 'Batata Mecânica', price: 28.00, desc: 'Batatas rústicas com páprica e alho confitado.' }
    ];

    let cart = {};

    function renderMenu(filter = 'drinks') {
        const container = document.getElementById('menu-items');
        container.innerHTML = '';
        
        menu.filter(item => item.cat === filter).forEach(item => {
            container.innerHTML += `
                <div class="product-card">
                    <div class="info">
                        <h3>${item.name}</h3>
                        <p>${item.desc}</p>
                        <span class="price">R$ ${item.price.toFixed(2)}</span>
                    </div>
                    <div class="qty-box">
                        <button class="btn-qty" onclick="updateQty(${item.id}, -1)">-</button>
                        <span id="qty-${item.id}" style="min-width: 20px; text-align: center; font-weight:bold">${cart[item.id] || 0}</span>
                        <button class="btn-qty" onclick="updateQty(${item.id}, 1)">+</button>
                    </div>
                </div>
            `;
        });
    }

    function updateQty(id, change) {
        if(!cart[id]) cart[id] = 0;
        cart[id] = Math.max(0, cart[id] + change);
        document.getElementById(`qty-${id}`).innerText = cart[id];
        updateUI();
    }

    function updateUI() {
        let total = 0;
        let itemsCount = 0;
        
        menu.forEach(p => {
            if(cart[p.id] > 0) {
                total += p.price * cart[p.id];
                itemsCount += cart[p.id];
            }
        });

        document.getElementById('total-price').innerText = `R$ ${total.toFixed(2)}`;
        
        const hasItems = itemsCount > 0;
        document.getElementById('footer-action').style.display = hasItems ? 'block' : 'none';
        document.getElementById('checkout-form').classList.toggle('visible', hasItems);
    }

    function filterCategory(cat) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        event.target.classList.add('active');
        renderMenu(cat);
    }

    function sendToWhatsApp() {
        const name = document.getElementById('user_name').value;
        const address = document.getElementById('user_address').value;

        if(!name || !address) {
            alert("Senhora, por favor, peça ao cliente para preencher nome e endereço!");
            return;
        }

        let msg = `*NOVO PEDIDO - LARANJA MECÂNICA*\n\n`;
        msg += `👤 *Cliente:* ${name}\n📍 *Endereço:* ${address}\n\n*ITENS:*\n`;

        let total = 0;
        menu.forEach(p => {
            if(cart[p.id] > 0) {
                msg += `🍊 ${cart[p.id]}x ${p.name} (R$ ${(p.price * cart[p.id]).toFixed(2)})\n`;
                total += p.price * cart[p.id];
            }
        });

        msg += `\n*TOTAL: R$ ${total.toFixed(2)}*`;
        
        // Aqui a senhora coloca o número do Laranja Mecânica
        const phone = "55839XXXXXXXX"; 
        window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`, '_blank');
    }

    renderMenu();
</script>

</body>
</html>
