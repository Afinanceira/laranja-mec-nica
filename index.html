<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laranja Mecânica | Cardápio Digital</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --orange: #ff6600;
            --dark-bg: #0f0f0f;
            --card-bg: #1a1a1a;
            --text-gray: #b3b3b3;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', -apple-system, sans-serif; }
        body { background: var(--dark-bg); color: white; padding-bottom: 100px; }

        /* HEADER */
        header { 
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1514362545857-3bc16c4c7d1b?auto=format&fit=crop&q=80&w=500');
            background-size: cover; background-position: center;
            text-align: center; padding: 50px 20px; border-bottom: 4px solid var(--orange);
        }
        .logo { width: 90px; height: 90px; border-radius: 50%; border: 3px solid var(--orange); margin-bottom: 15px; }
        header h1 { font-size: 1.5rem; letter-spacing: 2px; text-transform: uppercase; color: var(--orange); }
        header p { font-size: 0.8rem; color: white; opacity: 0.8; margin-top: 5px; }

        /* CATEGORIAS */
        .categories { 
            display: flex; overflow-x: auto; padding: 20px; gap: 10px; 
            sticky: top; background: var(--dark-bg); z-index: 10;
        }
        .cat-btn { 
            background: transparent; border: 1px solid var(--orange); color: var(--orange);
            padding: 8px 20px; border-radius: 25px; white-space: nowrap; font-size: 0.85rem;
            font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        .cat-btn.active { background: var(--orange); color: white; }

        /* LISTA DE PRODUTOS */
        .menu-section { padding: 0 20px; }
        .product-card { 
            background: var(--card-bg); border-radius: 15px; padding: 15px; 
            margin-bottom: 15px; display: flex; align-items: center; gap: 15px;
            border-left: 0 solid var(--orange); transition: 0.2s;
        }
        .product-card:active { border-left-width: 5px; transform: scale(0.98); }
        
        .product-img { width: 70px; height: 70px; border-radius: 10px; object-fit: cover; background: #333; }
        .product-info { flex: 1; }
        .product-info h3 { font-size: 1rem; margin-bottom: 4px; color: #fff; }
        .product-info p { font-size: 0.75rem; color: var(--text-gray); line-height: 1.3; }
        .product-price { color: var(--orange); font-weight: bold; margin-top: 8px; display: block; }

        /* CONTROLE DE QUANTIDADE */
        .qty-controls { display: flex; align-items: center; gap: 12px; background: #000; padding: 5px; border-radius: 8px; }
        .qty-btn { background: var(--orange); border: none; color: white; width: 25px; height: 25px; border-radius: 5px; cursor: pointer; }

        /* FOOTER / CARRINHO */
        .cart-footer { 
            position: fixed; bottom: 0; left: 0; right: 0; background: #222; 
            padding: 20px; border-top: 2px solid var(--orange); display: none;
        }
        .btn-order { 
            background: #25d366; color: white; width: 100%; padding: 15px; 
            border: none; border-radius: 12px; font-weight: bold; font-size: 1rem;
            display: flex; justify-content: space-between; align-items: center;
        }
    </style>
</head>
<body>

<header>
    <img src="https://via.placeholder.com/150" class="logo" alt="Logo Laranja Mecânica">
    <h1>Laranja Mecânica</h1>
    <p>Cocktails • Burgers • Culture</p>
</header>

<div class="categories">
    <button class="cat-btn active">Drinks da Casa</button>
    <button class="cat-btn">Cervejas</button>
    <button class="cat-btn">Petiscos</button>
    <button class="cat-btn">Burgers</button>
</div>

<div class="menu-section" id="menu-items">
    </div>

<div class="cart-footer" id="cart-footer">
    <button class="btn-order" onclick="finishOrder()">
        <span><i class="fab fa-whatsapp"></i> Enviar Pedido</span>
        <span id="total-label">R$ 0,00</span>
    </button>
</div>

<script>
    const products = [
        { id: 1, category: "Drinks", name: "Alex DeLarge", price: 34.00, desc: "Gin, licor de laranja, tônica e fatias de laranja fresca." },
        { id: 2, category: "Drinks", name: "Negroni Industrial", price: 32.00, desc: "Campari, Vermute tinto e Gin em infusão de carvalho." },
        { id: 3, category: "Burgers", name: "Moloko Burger", price: 38.00, desc: "Blend 180g, queijo cheddar, bacon caramelizado e maionese da casa." },
        { id: 4, category: "Petiscos", name: "Coxinha de Pato", price: 28.00, desc: "4 unidades acompanhadas de geleia de pimenta." }
    ];

    let cart = {};

    function renderMenu() {
        const container = document.getElementById('menu-items');
        container.innerHTML = products.map(p => `
            <div class="product-card">
                <div class="product-info">
                    <h3>${p.name}</h3>
                    <p>${p.desc}</p>
                    <span class="product-price">R$ ${p.price.toFixed(2)}</span>
                </div>
                <div class="qty-controls">
                    <button class="qty-btn" onclick="updateCart(${p.id}, -1)">-</button>
                    <span id="qty-${p.id}" style="font-weight: bold; min-width: 20px; text-align: center;">0</span>
                    <button class="qty-btn" onclick="updateCart(${p.id}, 1)">+</button>
                </div>
            </div>
        `).join('');
    }

    function updateCart(id, change) {
        if (!cart[id]) cart[id] = 0;
        cart[id] = Math.max(0, cart[id] + change);
        
        document.getElementById(`qty-${id}`).innerText = cart[id];
        calculateTotal();
    }

    function calculateTotal() {
        let total = 0;
        let hasItems = false;
        
        products.forEach(p => {
            if (cart[p.id] > 0) {
                total += p.price * cart[p.id];
                hasItems = true;
            }
        });

        document.getElementById('total-label').innerText = `R$ ${total.toFixed(2)}`;
        document.getElementById('cart-footer').style.display = hasItems ? 'block' : 'none';
    }

    function finishOrder() {
        let message = "*PEDIDO - LARANJA MECÂNICA*\n\n";
        let total = 0;

        products.forEach(p => {
            if (cart[p.id] > 0) {
                message += `🍊 ${cart[p.id]}x ${p.name} - R$ ${(p.price * cart[p.id]).toFixed(2)}\n`;
                total += p.price * cart[p.id];
            }
        });

        message += `\n*TOTAL: R$ ${total.toFixed(2)}*`;
        
        const phone = "55839XXXXXXXX"; // Substituir pelo WhatsApp do Bar
        window.open(`https://wa.me/${phone}?text=${encodeURIComponent(message)}`, '_blank');
    }

    renderMenu();
</script>

</body>
</html>
